name: release-assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package, for example v0.1.5
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: cdxmcpfix
            installed_bin: cdxmcpfix
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: cdxmcpfix
            installed_bin: cdxmcpfix
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: cdxmcpfix.exe
            installed_bin: cdxmcpfix.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Add Rust validation components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Check Unix installer syntax
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          sh -n scripts/install.sh
          bash -n scripts/install.sh

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke Unix binary
        if: runner.os != 'Windows'
        run: target/${{ matrix.target }}/release/${{ matrix.bin }} --version

      - name: Smoke Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: target\${{ matrix.target }}\release\${{ matrix.bin }} --version

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset_base="cdxmcpfix-${{ inputs.tag }}-${{ matrix.target }}"
          stage="$RUNNER_TEMP/$asset_base"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$stage/${{ matrix.installed_bin }}"
          cp README.md LICENSE "$stage/"
          cp -R schemas "$stage/schemas"
          cp -R docs "$stage/docs"
          cp .mcp.json "$stage/.mcp.json"
          mkdir -p "$stage/.codex-plugin"
          cp .codex-plugin/plugin.json "$stage/.codex-plugin/plugin.json"
          tar -czf "$GITHUB_WORKSPACE/$asset_base.tar.gz" -C "$stage" .

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetBase = "cdxmcpfix-${{ inputs.tag }}-${{ matrix.target }}"
          $stage = Join-Path $env:RUNNER_TEMP $assetBase
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -LiteralPath "target\${{ matrix.target }}\release\${{ matrix.bin }}" -Destination (Join-Path $stage '${{ matrix.installed_bin }}') -Force
          Copy-Item -LiteralPath README.md -Destination (Join-Path $stage README.md) -Force
          Copy-Item -LiteralPath LICENSE -Destination (Join-Path $stage LICENSE) -Force
          Copy-Item -LiteralPath schemas -Destination $stage -Recurse -Force
          Copy-Item -LiteralPath docs -Destination $stage -Recurse -Force
          Copy-Item -LiteralPath .mcp.json -Destination (Join-Path $stage .mcp.json) -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $stage '.codex-plugin') | Out-Null
          Copy-Item -LiteralPath .codex-plugin\plugin.json -Destination (Join-Path $stage '.codex-plugin\plugin.json') -Force
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath (Join-Path $env:GITHUB_WORKSPACE "$assetBase.zip") -Force

      - uses: actions/upload-artifact@v4
        with:
          name: cdxmcpfix-${{ matrix.target }}
          path: cdxmcpfix-${{ inputs.tag }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: publish release assets
    runs-on: ubuntu-latest
    needs: build
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare checksums and installers
        shell: bash
        run: |
          set -euo pipefail
          sh -n scripts/install.sh
          bash -n scripts/install.sh
          cp scripts/install.ps1 dist/install.ps1
          cp scripts/install.sh dist/install.sh
          chmod 0755 dist/install.sh
          cd dist
          sha256sum cdxmcpfix-* install.ps1 install.sh > SHA256SUMS.txt

      - name: Create release if needed
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "CDXMCPFix $TAG" \
              --notes "CDXMCPFix $TAG release assets."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "CDXMCPFix $TAG" \
              --notes "CDXMCPFix $TAG release assets."
          fi

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset "$TAG" "$asset" \
              --repo "$GITHUB_REPOSITORY" \
              --yes
          done < <(gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name | select(startswith("cdxcore-"))')

          gh release upload "$TAG" dist/cdxmcpfix-* dist/SHA256SUMS.txt dist/install.ps1 dist/install.sh \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
